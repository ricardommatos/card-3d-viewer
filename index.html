<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
  <title>Card / 3D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --fg: #000;
      --muted: rgba(0, 0, 0, 0.4);
      --border: #000;
      --panel-bg: rgba(255, 255, 255, 0.92);
      --accent: #1100ff;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-weight: 400;
      color: var(--fg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body.bg-light  { background: #e5e5e5; }
    body.bg-dark   { background: #111111; }
    body.bg-transparent {
      background-color: #e5e5e5;
      background-image:
        linear-gradient(45deg, #c8c8c8 25%, transparent 25%),
        linear-gradient(-45deg, #c8c8c8 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #c8c8c8 75%),
        linear-gradient(-45deg, transparent 75%, #c8c8c8 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0;
    }

    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;
      cursor: grab;
    }
    #canvas:active { cursor: grabbing; }

    /* === UI PANEL === */
    #ui {
      position: fixed;
      top: 24px;
      left: 24px;
      width: 272px;
      background: var(--panel-bg);
      backdrop-filter: blur(10px) saturate(120%);
      -webkit-backdrop-filter: blur(10px) saturate(120%);
      border: 1px solid var(--border);
      padding: 16px 16px 14px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 10px;
      line-height: 1.2;
      user-select: none;
      z-index: 10;
    }

    #ui .title {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-weight: 600;
      font-size: 10px;
      padding-bottom: 12px;
      margin-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    #ui .title .muted { font-weight: 400; color: var(--muted); }

    #ui .group {
      margin-bottom: 14px;
    }

    #ui .group-label {
      font-size: 9px;
      color: var(--muted);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #ui .group-label::before {
      content: "";
      display: inline-block;
      width: 6px;
      height: 1px;
      background: var(--muted);
    }

    #ui .row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    #ui .row label {
      flex: 0 0 52px;
      font-size: 10px;
    }
    #ui .row .value {
      flex: 0 0 32px;
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-size: 10px;
    }

    /* sliders */
    #ui input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 1px;
      background: #000;
      outline: none;
      margin: 0;
      padding: 0;
    }
    #ui input[type="range"]::-webkit-slider-runnable-track {
      height: 1px;
      background: #000;
    }
    #ui input[type="range"]::-moz-range-track {
      height: 1px;
      background: #000;
    }
    #ui input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 10px;
      height: 10px;
      background: #000;
      cursor: pointer;
      border: none;
      margin-top: -4.5px;
      border-radius: 0;
    }
    #ui input[type="range"]::-moz-range-thumb {
      width: 10px;
      height: 10px;
      background: #000;
      cursor: pointer;
      border: none;
      border-radius: 0;
    }

    /* buttons */
    #ui button {
      font-family: inherit;
      font-size: 10px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 7px 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--fg);
      cursor: pointer;
      transition: background 0.12s linear, color 0.12s linear;
      -webkit-tap-highlight-color: transparent;
    }
    #ui button:hover {
      background: #000;
      color: #fff;
    }
    #ui button.active {
      background: #000;
      color: #fff;
    }

    #ui .btn-row {
      display: flex;
      gap: 4px;
    }
    #ui .btn-row button { flex: 1; }

    #ui .full-btn {
      display: block;
      width: 100%;
      margin-top: 6px;
      padding: 9px;
    }

    #ui .full-btn.primary {
      background: #000;
      color: #fff;
    }
    #ui .full-btn.primary:hover {
      background: var(--accent);
      color: #fff;
    }

    #ui .hint {
      font-size: 8px;
      color: var(--muted);
      margin-top: 14px;
      padding-top: 10px;
      border-top: 1px solid rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    /* layer drop slots */
    #ui .layer-slot {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
      border: 1px dashed rgba(0, 0, 0, 0.2);
      margin-bottom: 4px;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
    }
    #ui .layer-slot:last-child { margin-bottom: 0; }
    #ui .layer-slot:hover { border-color: #000; }
    #ui .layer-slot.drag-over {
      border-color: var(--accent);
      background: rgba(17, 0, 255, 0.06);
    }
    #ui .layer-slot .layer-label { flex: 1; font-size: 10px; }
    #ui .layer-slot .layer-thumb {
      width: 28px;
      height: 28px;
      border: 1px solid rgba(0, 0, 0, 0.15);
      flex-shrink: 0;
    }
    #ui .layer-slot input[type="file"] { display: none; }

    /* hide UI in export render would be nice, but for screenshot-style export
       the UI doesn't appear in the canvas anyway (it's an HTML overlay). */
  </style>
</head>
<body class="bg-light">
  <div id="ui">
    <div class="title">
      <span>Card · 3D</span>
    </div>

    <div class="group">
      <div class="group-label">Layers</div>
      <div class="layer-slot" data-layer-index="0">
        <span class="layer-label">L5 · Back</span>
        <canvas class="layer-thumb" width="28" height="28"></canvas>
        <input type="file" accept="image/*">
      </div>
      <div class="layer-slot" data-layer-index="1">
        <span class="layer-label">L4</span>
        <canvas class="layer-thumb" width="28" height="28"></canvas>
        <input type="file" accept="image/*">
      </div>
      <div class="layer-slot" data-layer-index="2">
        <span class="layer-label">L3</span>
        <canvas class="layer-thumb" width="28" height="28"></canvas>
        <input type="file" accept="image/*">
      </div>
      <div class="layer-slot" data-layer-index="3">
        <span class="layer-label">L2</span>
        <canvas class="layer-thumb" width="28" height="28"></canvas>
        <input type="file" accept="image/*">
      </div>
      <div class="layer-slot" data-layer-index="4">
        <span class="layer-label">L1 · Front</span>
        <canvas class="layer-thumb" width="28" height="28"></canvas>
        <input type="file" accept="image/*">
      </div>
    </div>

    <div class="group">
      <div class="group-label">Card</div>
      <div class="row">
        <label>Spacing</label>
        <input type="range" id="ctl-spacing" min="0" max="2" step="0.01" value="0.4">
        <span class="value" id="val-spacing">0.40</span>
      </div>
      <div class="row">
        <label>Scale</label>
        <input type="range" id="ctl-scale" min="0.4" max="2" step="0.01" value="1">
        <span class="value" id="val-scale">1.00</span>
      </div>
    </div>

    <div class="group">
      <div class="group-label">Camera</div>
      <div class="row">
        <label>FOV</label>
        <input type="range" id="ctl-fov" min="15" max="70" step="1" value="35">
        <span class="value" id="val-fov">35</span>
      </div>
    </div>

    <div class="group">
      <div class="group-label">Rotation</div>
      <div class="btn-row">
        <button data-preset="front">Front</button>
        <button data-preset="iso" class="active">Iso</button>
        <button data-preset="side">Side</button>
        <button data-preset="top">Top</button>
      </div>
      <button id="ctl-auto" class="full-btn">Auto-Rotate · Off</button>
    </div>

    <div class="group">
      <div class="group-label">Scene</div>
      <div class="btn-row">
        <button data-bg="light" class="active">Light</button>
        <button data-bg="dark">Dark</button>
        <button data-bg="transparent">Trans</button>
      </div>
    </div>

    <button class="full-btn" id="ctl-reset">Reset</button>
    <button class="full-btn primary" id="ctl-export">Export PNG · 2×</button>

    <div class="hint">Drag · Rotate &nbsp;·&nbsp; Wheel · Zoom</div>
  </div>

  <canvas id="canvas"></canvas>

    const SVGS = { 1: SVG_1, 2: SVG_2, 3: SVG_3, 4: SVG_4, 5: SVG_5 };

    // ============================================================
    // STATE
    // ============================================================
    const DEFAULTS = Object.freeze({
      spacing: 0.4,
      scale: 1.0,
      fov: 35,
      bg: 'light',
      autoRotate: false,
      cameraZ: 18,
    });
    const state = { ...DEFAULTS };

    const PRESETS = {
      front: [0, 0, 0],
      iso:   [-0.28, -0.55, 0],
      side:  [0, -1.35, 0],
      top:   [-1.35, 0, 0],
    };

    // ============================================================
    // THREE.JS SCENE
    // ============================================================
    const canvas = document.getElementById('canvas');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xe5e5e5);

    const camera = new THREE.PerspectiveCamera(
      state.fov,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 0, state.cameraZ);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: true,
      alpha: true,
      preserveDrawingBuffer: true,
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight, false);
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    // ============================================================
    // SVG → TEXTURE
    // ============================================================
    async function svgToTexture(svgString, size = 2048) {
      // Force the SVG to rasterize at our target size by rewriting
      // the outer width/height attributes. viewBox stays intact,
      // so the drawing scales cleanly.
      const sized = svgString.replace(
        /<svg\s+width="\d+"\s+height="\d+"/,
        `<svg width="${size}" height="${size}"`
      );
      const blob = new Blob([sized], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);

      const img = new Image();
      img.decoding = 'async';
      await new Promise((resolve, reject) => {
        img.onload = resolve;
        img.onerror = reject;
        img.src = url;
      });

      const cv = document.createElement('canvas');
      cv.width = size;
      cv.height = size;
      const ctx = cv.getContext('2d');
      ctx.drawImage(img, 0, 0, size, size);
      URL.revokeObjectURL(url);

      const tex = new THREE.CanvasTexture(cv);
      tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.needsUpdate = true;
      return tex;
    }

    // ============================================================
    // FILE → TEXTURE (supports SVG, PNG, JPG, WebP)
    // ============================================================
    async function fileToTexture(file, size = 2048) {
      // SVG files get the viewBox resize trick for crisp rendering
      if (file.type === 'image/svg+xml' || file.name.endsWith('.svg')) {
        const text = await file.text();
        return svgToTexture(text, size);
      }
      // Raster images: blob URL → Image → canvas
      const url = URL.createObjectURL(file);
      const img = new Image();
      await new Promise((resolve, reject) => {
        img.onload = resolve;
        img.onerror = reject;
        img.src = url;
      });
      const cv = document.createElement('canvas');
      cv.width = size;
      cv.height = size;
      const ctx = cv.getContext('2d');
      // Center-cover: draw the image centered, covering the square
      const scale = Math.max(size / img.width, size / img.height);
      const w = img.width * scale;
      const h = img.height * scale;
      ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
      URL.revokeObjectURL(url);
      const tex = new THREE.CanvasTexture(cv);
      tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.needsUpdate = true;
      return tex;
    }

    // ============================================================
    // CARD CONSTRUCTION
    // ============================================================
    const cardGroup = new THREE.Group();
    // Start at ISO rotation so the 3D effect is visible immediately
    cardGroup.rotation.set(...PRESETS.iso);
    scene.add(cardGroup);

    const CARD_SIZE = 10;
    const geo = new THREE.PlaneGeometry(CARD_SIZE, CARD_SIZE);

    // back → front: layer 4 (blue bg) → layer 3 (headline) → layer 2 (small text) → layer 1 (circle)
    const ORDER = [5, 4, 3, 2, 1];
    const layers = [];
    const originalTextures = [];

    async function buildCard() {
      for (let i = 0; i < ORDER.length; i++) {
        const tex = await svgToTexture(SVGS[ORDER[i]]);
        originalTextures.push(tex);
        const mat = new THREE.MeshBasicMaterial({
          map: tex,
          transparent: true,
          alphaTest: 0.01,
          side: i === 0 ? THREE.DoubleSide : THREE.FrontSide,
          depthWrite: false,
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.z = i * state.spacing;
        mesh.renderOrder = i;
        cardGroup.add(mesh);
        layers.push({ mesh, stackIndex: i });
      }
    }

    // ============================================================
    // LAYER REPLACEMENT (drag-and-drop / click-to-browse)
    // ============================================================
    function updateThumb(index, sourceCanvas) {
      const thumbs = document.querySelectorAll('.layer-slot .layer-thumb');
      const thumb = thumbs[index];
      if (!thumb) return;
      const ctx = thumb.getContext('2d');
      ctx.clearRect(0, 0, 28, 28);
      ctx.drawImage(sourceCanvas, 0, 0, 28, 28);
    }

    function initThumbs() {
      layers.forEach((l, i) => {
        const srcCanvas = l.mesh.material.map.source.data;
        if (srcCanvas) updateThumb(i, srcCanvas);
      });
    }

    async function replaceLayer(index, file) {
      const tex = await fileToTexture(file);
      const layer = layers[index];
      // Don't dispose original textures — they're needed for reset
      if (layer.mesh.material.map !== originalTextures[index]) {
        layer.mesh.material.map.dispose();
      }
      layer.mesh.material.map = tex;
      layer.mesh.material.needsUpdate = true;
      updateThumb(index, tex.source.data);
    }

    function resetLayers() {
      layers.forEach((l, i) => {
        if (l.mesh.material.map !== originalTextures[i]) {
          l.mesh.material.map.dispose();
          l.mesh.material.map = originalTextures[i];
          l.mesh.material.needsUpdate = true;
        }
        updateThumb(i, originalTextures[i].source.data);
      });
    }

    // ============================================================
    // BACK TEXT PLANE
    // ============================================================
    // A plane sitting just behind the blue card, facing backward in local
    // space, with "NOTHING TO SEE HERE :)" rendered into a canvas texture.
    // Only visible when the card is rotated past 90° (i.e. you're looking
    // at the back of the card).
    async function buildBackText() {
      // Wait for JetBrains Mono to load before drawing to canvas, otherwise
      // the browser falls back to a system monospace.
      try {
        await document.fonts.load('400 26px "JetBrains Mono"');
      } catch (_) { /* best effort */ }

      const size = 2048;
      const cv = document.createElement('canvas');
      cv.width = size;
      cv.height = size;
      const ctx = cv.getContext('2d');
      ctx.clearRect(0, 0, size, size);

      // Font size chosen to visually match the 10–11px UI text when the card
      // fills most of the viewport. (1 world unit ≈ 204.8 texture px,
      // card is ~88% of view height → 1 screen px ≈ 2.3 texture px.)
      ctx.font = '400 26px "JetBrains Mono", ui-monospace, monospace';
      if ('letterSpacing' in ctx) ctx.letterSpacing = '2.08px'; // ~0.08em
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
      ctx.fillText('NOTHING TO SEE HERE :)', size / 2, size / 2);

      const tex = new THREE.CanvasTexture(cv);
      tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.needsUpdate = true;

      const mat = new THREE.MeshBasicMaterial({
        map: tex,
        transparent: true,
        alphaTest: 0.01,
        side: THREE.FrontSide,
        depthWrite: false,
      });

      const mesh = new THREE.Mesh(
        new THREE.PlaneGeometry(CARD_SIZE, CARD_SIZE),
        mat
      );
      // Position just behind the blue card in local space
      mesh.position.z = -0.01;
      // Flip 180° around Y so the mesh's front-face points away in the
      // default orientation. When cardGroup rotates 180° the compound
      // rotation is identity and this plane ends up facing the camera
      // with its UVs un-mirrored.
      mesh.rotation.y = Math.PI;
      // Draw after the blue card but before the front content layers.
      // Only matters if both sides happened to be visible simultaneously —
      // in practice FrontSide culling ensures this plane is only drawn
      // when the user is looking at the back.
      mesh.renderOrder = 0.5;
      cardGroup.add(mesh);
    }

    // ============================================================
    // DRAG-TO-ROTATE (card rotates, camera stays fixed)
    // ============================================================
    const drag = { active: false, prevX: 0, prevY: 0, vx: 0, vy: 0, pointerId: null };
    const DAMPING = 0.93;
    const SENSITIVITY = 0.008;
    const VELOCITY_EPS = 0.00005;

    canvas.addEventListener('pointerdown', (e) => {
      drag.active = true;
      drag.prevX = e.clientX;
      drag.prevY = e.clientY;
      drag.vx = 0;
      drag.vy = 0;
      drag.pointerId = e.pointerId;
      canvas.setPointerCapture(e.pointerId);
      // Cancel any ongoing preset tween if user grabs
      tween.active = false;
    });

    canvas.addEventListener('pointermove', (e) => {
      if (!drag.active) return;
      const dx = e.clientX - drag.prevX;
      const dy = e.clientY - drag.prevY;
      drag.vx = dx * SENSITIVITY;
      drag.vy = dy * SENSITIVITY;
      cardGroup.rotation.y += drag.vx;
      cardGroup.rotation.x += drag.vy;
      drag.prevX = e.clientX;
      drag.prevY = e.clientY;
    });

    const endDrag = (e) => {
      if (!drag.active) return;
      drag.active = false;
      try { canvas.releasePointerCapture(drag.pointerId); } catch (_) {}
      drag.pointerId = null;
    };
    canvas.addEventListener('pointerup', endDrag);
    canvas.addEventListener('pointercancel', endDrag);
    canvas.addEventListener('pointerleave', endDrag);

    // Wheel → dolly in/out along camera Z
    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      state.cameraZ = THREE.MathUtils.clamp(
        state.cameraZ + e.deltaY * 0.015,
        6, 50
      );
      camera.position.z = state.cameraZ;
    }, { passive: false });

    // ============================================================
    // PRESET TWEEN (quaternion slerp)
    // ============================================================
    const tween = {
      active: false,
      from: new THREE.Quaternion(),
      to: new THREE.Quaternion(),
      t: 0,
      duration: 0.65,
    };
    const tmpEuler = new THREE.Euler();

    function setPreset(name) {
      const euler = PRESETS[name];
      if (!euler) return;
      tmpEuler.set(euler[0], euler[1], euler[2], 'XYZ');
      tween.from.copy(cardGroup.quaternion);
      tween.to.setFromEuler(tmpEuler);
      tween.t = 0;
      tween.active = true;
      drag.vx = 0;
      drag.vy = 0;
      // UI active state
      document.querySelectorAll('[data-preset]').forEach(b =>
        b.classList.toggle('active', b.dataset.preset === name)
      );
    }

    // ============================================================
    // APPLY STATE TO SCENE
    // ============================================================
    function applyCardState() {
      layers.forEach((l, i) => { l.mesh.position.z = i * state.spacing; });
      cardGroup.scale.setScalar(state.scale);
      camera.fov = state.fov;
      camera.updateProjectionMatrix();
    }

    function applyBgState() {
      document.body.className = `bg-${state.bg}`;
      if (state.bg === 'light') scene.background = new THREE.Color(0xe5e5e5);
      else if (state.bg === 'dark') scene.background = new THREE.Color(0x111111);
      else scene.background = null; // transparent
      document.querySelectorAll('[data-bg]').forEach(b =>
        b.classList.toggle('active', b.dataset.bg === state.bg)
      );
    }

    function syncUI() {
      document.getElementById('ctl-spacing').value = state.spacing;
      document.getElementById('val-spacing').textContent = state.spacing.toFixed(2);
      document.getElementById('ctl-scale').value = state.scale;
      document.getElementById('val-scale').textContent = state.scale.toFixed(2);
      document.getElementById('ctl-fov').value = state.fov;
      document.getElementById('val-fov').textContent = state.fov;
      const autoBtn = document.getElementById('ctl-auto');
      autoBtn.textContent = `Auto-Rotate · ${state.autoRotate ? 'On' : 'Off'}`;
      autoBtn.classList.toggle('active', state.autoRotate);
    }

    function reset() {
      Object.assign(state, DEFAULTS);
      camera.position.z = state.cameraZ;
      drag.vx = 0;
      drag.vy = 0;
      tween.active = false;
      cardGroup.rotation.set(...PRESETS.iso);
      cardGroup.quaternion.setFromEuler(
        tmpEuler.set(...PRESETS.iso, 'XYZ')
      );
      applyCardState();
      applyBgState();
      resetLayers();
      syncUI();
      document.querySelectorAll('[data-preset]').forEach(b =>
        b.classList.toggle('active', b.dataset.preset === 'iso')
      );
    }

    // ============================================================
    // RENDER LOOP
    // ============================================================
    let lastT = performance.now();
    function animate(now) {
      requestAnimationFrame(animate);
      const dt = Math.min(0.05, (now - lastT) / 1000);
      lastT = now;

      if (tween.active) {
        tween.t += dt / tween.duration;
        const k = Math.min(1, tween.t);
        // smoothstep easing
        const eased = k * k * (3 - 2 * k);
        cardGroup.quaternion.copy(tween.from).slerp(tween.to, eased);
        if (k >= 1) tween.active = false;
      } else if (!drag.active) {
        // Inertia decay
        if (Math.abs(drag.vx) > VELOCITY_EPS || Math.abs(drag.vy) > VELOCITY_EPS) {
          cardGroup.rotation.y += drag.vx;
          cardGroup.rotation.x += drag.vy;
          drag.vx *= DAMPING;
          drag.vy *= DAMPING;
        } else {
          drag.vx = 0;
          drag.vy = 0;
        }
        // Auto-rotate (only when idle)
        if (state.autoRotate) {
          cardGroup.rotation.y += 0.004;
        }
      }

      renderer.render(scene, camera);
    }

    // ============================================================
    // EXPORT
    // ============================================================
    function exportPNG(scaleFactor = 2) {
      const prevW = window.innerWidth;
      const prevH = window.innerHeight;
      const prevDPR = renderer.getPixelRatio();

      const w = Math.floor(prevW * scaleFactor);
      const h = Math.floor(prevH * scaleFactor);

      renderer.setPixelRatio(1);
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.render(scene, camera);

      const dataUrl = renderer.domElement.toDataURL('image/png');
      const a = document.createElement('a');
      a.download = `card-3d-${Date.now()}.png`;
      a.href = dataUrl;
      document.body.appendChild(a);
      a.click();
      a.remove();

      // Restore
      renderer.setPixelRatio(prevDPR);
      renderer.setSize(prevW, prevH, false);
      camera.aspect = prevW / prevH;
      camera.updateProjectionMatrix();
    }

    // ============================================================
    // UI WIRING
    // ============================================================
    document.getElementById('ctl-spacing').addEventListener('input', (e) => {
      state.spacing = parseFloat(e.target.value);
      document.getElementById('val-spacing').textContent = state.spacing.toFixed(2);
      layers.forEach((l, i) => { l.mesh.position.z = i * state.spacing; });
    });

    document.getElementById('ctl-scale').addEventListener('input', (e) => {
      state.scale = parseFloat(e.target.value);
      document.getElementById('val-scale').textContent = state.scale.toFixed(2);
      cardGroup.scale.setScalar(state.scale);
    });

    document.getElementById('ctl-fov').addEventListener('input', (e) => {
      state.fov = parseFloat(e.target.value);
      document.getElementById('val-fov').textContent = state.fov;
      camera.fov = state.fov;
      camera.updateProjectionMatrix();
    });

    document.querySelectorAll('[data-preset]').forEach((btn) => {
      btn.addEventListener('click', () => setPreset(btn.dataset.preset));
    });

    document.querySelectorAll('[data-bg]').forEach((btn) => {
      btn.addEventListener('click', () => {
        state.bg = btn.dataset.bg;
        applyBgState();
      });
    });

    document.getElementById('ctl-auto').addEventListener('click', () => {
      state.autoRotate = !state.autoRotate;
      syncUI();
    });

    document.getElementById('ctl-reset').addEventListener('click', reset);
    document.getElementById('ctl-export').addEventListener('click', () => exportPNG(2));

    // Layer slot drop + click handlers
    document.querySelectorAll('.layer-slot').forEach((slot) => {
      const idx = parseInt(slot.dataset.layerIndex);
      const fileInput = slot.querySelector('input[type="file"]');

      slot.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'copy';
        slot.classList.add('drag-over');
      });
      slot.addEventListener('dragleave', () => slot.classList.remove('drag-over'));
      slot.addEventListener('drop', async (e) => {
        e.preventDefault();
        slot.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) {
          await replaceLayer(idx, file);
        }
      });

      // Click → open file picker as fallback
      slot.addEventListener('click', (e) => {
        if (e.target === fileInput) return;
        fileInput.click();
      });
      fileInput.addEventListener('change', async () => {
        const file = fileInput.files[0];
        if (file) await replaceLayer(idx, file);
        fileInput.value = ''; // allow re-selecting same file
      });
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT') return;
      switch (e.key.toLowerCase()) {
        case 'r': reset(); break;
        case 'e': exportPNG(2); break;
        case '1': setPreset('front'); break;
        case '2': setPreset('iso'); break;
        case '3': setPreset('side'); break;
        case '4': setPreset('top'); break;
        case ' ':
          state.autoRotate = !state.autoRotate;
          syncUI();
          e.preventDefault();
          break;
      }
    });

    // Resize
    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight, false);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });

    // ============================================================
    // KICK OFF
    // ============================================================
    Promise.all([buildCard(), buildBackText()]).then(() => {
      applyCardState();
      applyBgState();
      syncUI();
      initThumbs();
      requestAnimationFrame(animate);
    }).catch((err) => {
      console.error('Failed to build card:', err);
      document.body.insertAdjacentHTML(
        'beforeend',
        `<div style="position:fixed;inset:0;display:grid;place-items:center;font-family:monospace;background:#fee">
          <div>FAILED TO LOAD SVG TEXTURES<br>${err.message || err}</div>
        </div>`
      );
    });
  </script>
</body>
</html>
